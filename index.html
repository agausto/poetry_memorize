<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetry memorizer</title>
  <style>
* {
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
  background: #f9f9f9;
  color: #222;
}

h1 {
  font-size: 1.4rem;
  margin-bottom: 24px;
}

textarea {
  font-size: 16px;
  font-family: Helvetica, Arial, sans-serif;
  width: 100%;
  height: 200px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  resize: vertical;
}

button {
  margin-top: 10px;
  padding: 8px 18px;
  font-size: 15px;
  cursor: pointer;
  border: 1px solid #999;
  border-radius: 4px;
  background: #fff;
}

button:hover {
  background: #eee;
}

#memorize-view {
  display: none;
}

#controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#level-indicator {
  font-size: 14px;
  color: #555;
}

#instructions {
  font-size: 13px;
  color: #888;
  margin-bottom: 16px;
}

#poem-display {
  font-family: monospace;
  font-size: 15px;
  line-height: 1.8;
}

.stanza {
  margin-bottom: 1.4em;
}

.line {
  display: block;
  white-space: pre-wrap;
}

.word {
  cursor: pointer;
  border-radius: 2px;
  padding: 0 1px;
}

.word:hover {
  background: #d0e8ff;
}
  </style>
</head>
<body>
  <div id="input-view">
    <h1>Poetry memorizer</h1>
    <textarea id="poem-input" placeholder="Paste your poem here..."></textarea>
    <br>
    <button id="start-btn">Start memorizing</button>
  </div>

  <div id="memorize-view" style="display: none;">
    <div id="controls">
      <button id="new-poem-btn">New poem</button>
      <span id="level-indicator">Level: 1</span>
    </div>
    <div id="instructions">Click a word to reveal more letters. Use ← → arrow keys to delete/reveal letters.</div>
    <div id="poem-display"></div>
  </div>

  <script type="module">
let stanzas = [];
let globalRevealLevel = 1;

function parsePoem(text) {
  const stanzaBlocks = text.trim().split(/\n\n+/);
  return stanzaBlocks.map(block => {
    const lines = block.split('\n');
    return lines.map(line => {
      const tokens = line.split(/\s+/).filter(t => t.length > 0);
      return tokens.map(token => {
        const m = token.match(/^([^a-zA-Z']*)([a-zA-Z'].*?[a-zA-Z']|[a-zA-Z']?)([^a-zA-Z']*)$/);
        if (!m) {
          return { original: token, leading: token, core: '', trailing: '', individualReveal: 0 };
        }
        return {
          original: token,
          leading: m[1],
          core: m[2],
          trailing: m[3],
          individualReveal: 0
        };
      });
    });
  });
}

/**
 * UPDATED: This function now simply slices the word 
 * without appending underscores for the remainder.
 */
function getDisplayText(word) {
  if (word.core === '') {
    return word.original;
  }
  const effective = Math.max(globalRevealLevel, word.individualReveal);
  const shown = word.core.slice(0, effective);
  
  // We no longer calculate a "hidden" string of underscores.
  return word.leading + shown + word.trailing;
}

function renderPoem() {
  const display = document.getElementById('poem-display');
  display.innerHTML = '';
  stanzas.forEach((lines, si) => {
    const stanzaEl = document.createElement('div');
    stanzaEl.className = 'stanza';
    lines.forEach((words, li) => {
      const lineEl = document.createElement('div');
      lineEl.className = 'line';
      words.forEach((word, wi) => {
        if (wi > 0) {
          lineEl.appendChild(document.createTextNode(' '));
        }
        const span = document.createElement('span');
        span.className = 'word';
        span.dataset.stanza = si;
        span.dataset.line = li;
        span.dataset.word = wi;
        span.textContent = getDisplayText(word);
        lineEl.appendChild(span);
      });
      stanzaEl.appendChild(lineEl);
    });
    display.appendChild(stanzaEl);
  });
}

function updateSpan(span) {
  const si = +span.dataset.stanza;
  const li = +span.dataset.line;
  const wi = +span.dataset.word;
  span.textContent = getDisplayText(stanzas[si][li][wi]);
}

function updateAllSpans() {
  document.querySelectorAll('#poem-display .word').forEach(span => updateSpan(span));
  document.getElementById('level-indicator').textContent = 'Level: ' + globalRevealLevel;
}

function startMemorizing() {
  const text = document.getElementById('poem-input').value;
  if (!text.trim()) return;
  stanzas = parsePoem(text);
  globalRevealLevel = 1;
  document.getElementById('input-view').style.display = 'none';
  document.getElementById('memorize-view').style.display = 'block';
  document.getElementById('level-indicator').textContent = 'Level: 1';
  renderPoem();
}

function resetToInput() {
  document.getElementById('memorize-view').style.display = 'none';
  document.getElementById('input-view').style.display = 'block';
}

document.getElementById('start-btn').addEventListener('click', startMemorizing);
document.getElementById('new-poem-btn').addEventListener('click', resetToInput);

document.getElementById('poem-display').addEventListener('click', e => {
  const span = e.target.closest('.word');
  if (!span) return;
  const si = +span.dataset.stanza;
  const li = +span.dataset.line;
  const wi = +span.dataset.word;
  const word = stanzas[si][li][wi];
  if (word.core === '') return;
  word.individualReveal = Math.min(word.individualReveal + 1, word.core.length);
  updateSpan(span);
});

document.addEventListener('keydown', e => {
  if (document.getElementById('memorize-view').style.display === 'none') return;
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    globalRevealLevel++;
    updateAllSpans();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    globalRevealLevel = Math.max(0, globalRevealLevel - 1); // Allowed level 0 for total deletion
    updateAllSpans();
  }
});
  </script>
</body>
</html>
