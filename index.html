<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetry memorizer</title>
  <style>
* {
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
  background: #f9f9f9;
  color: #222;
}

h1 {
  font-size: 1.4rem;
  margin-bottom: 24px;
}

textarea {
  font-size: 16px;
  font-family: Helvetica, Arial, sans-serif;
  width: 100%;
  height: 200px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  resize: vertical;
}

button {
  margin-top: 10px;
  padding: 8px 18px;
  font-size: 15px;
  cursor: pointer;
  border: 1px solid #999;
  border-radius: 4px;
  background: #fff;
}

button:hover {
  background: #eee;
}

#memorize-view {
  display: none;
}

#controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#level-indicator {
  font-size: 14px;
  color: #555;
}

#instructions {
  font-size: 13px;
  color: #888;
  margin-bottom: 16px;
}

#poem-display {
  font-family: monospace;
  font-size: 15px;
  line-height: 1.8;
}

.stanza {
  margin-bottom: 1.4em;
}

.line {
  display: block;
  white-space: pre-wrap;
}

.word {
  cursor: pointer;
  border-radius: 2px;
  padding: 0 1px;
}

.word:hover {
  background: #d0e8ff;
}
  </style>
</head>
<body>
  <div id="input-view">
    <h1>Poetry memorizer</h1>
    <textarea id="poem-input" placeholder="Paste your poem here..."></textarea>
    <br>
    <input type="file" id="file-input" accept=".txt" style="display: none;">
    <button id="load-file-btn">Load file</button>
    <button id="start-btn">Start memorizing</button>
  </div>

  <div id="memorize-view" style="display: none;">
    <div id="controls">
      <button id="new-poem-btn">New poem</button>
      <button id="reset-indiv">Reset Individual Reveal</button>
      <span id="level-indicator">Level: 1</span>
    </div>
    <div id="instructions">Click a word to reveal more letters. Use ← → arrow keys to delete/reveal letters.</div>
    <div id="poem-display"></div>
  </div>

  <script type="module">
let stanzas = [];
let globalRevealLevel = 1;

function parsePoem(text) {
  const stanzaBlocks = text.trim().split(/\n\n+/);
  
  return stanzaBlocks.map(block => {
    const lines = block.split('\n');
    
    return lines.map(line => {
      // FIX: Removed ' from the regex. Now it only matches actual letter sequences.
      // This means "'tis" is split into [separator: "'", word: "tis"]
      const parts = line.split(/([a-zA-Z]+)/);
      const tokens = [];

      for (let i = 1; i < parts.length; i += 2) {
        const word = parts[i];
        // parts[0] is everything before the first word.
        // parts[i+1] is everything between the current word and the next word.
        const leading = (i === 1) ? parts[0] : ''; 
        const trailing = parts[i + 1] || '';
        
        tokens.push({
          original: leading + word + trailing,
          leading: leading,
          core: word,
          trailing: trailing,
          individualReveal: 0
        });
      }

      if (tokens.length === 0 && line.trim().length > 0) {
        tokens.push({
          original: line,
          leading: line,
          core: '',
          trailing: '',
          individualReveal: 0
        });
      }

      return tokens;
    });
  });
}

/**
 * UPDATED: This function now simply slices the word 
 * without appending underscores for the remainder.
 */
function getDisplayText(word) {
  if (word.core === '') {
    return word.original;
  }
  const effective = Math.max(globalRevealLevel, word.individualReveal);
  const shown = word.core.slice(0, effective);
  
  // We no longer calculate a "hidden" string of underscores.
  return word.leading + shown + word.trailing;
}

function renderPoem() {
  const display = document.getElementById('poem-display');
  display.innerHTML = '';
  stanzas.forEach((lines, si) => {
    const stanzaEl = document.createElement('div');
    stanzaEl.className = 'stanza';
    lines.forEach((words, li) => {
      const lineEl = document.createElement('div');
      lineEl.className = 'line';
      words.forEach((word, wi) => {
        if (wi > 0) {
          lineEl.appendChild(document.createTextNode(''));
        }
        const span = document.createElement('span');
        span.className = 'word';
        span.dataset.stanza = si;
        span.dataset.line = li;
        span.dataset.word = wi;
        span.textContent = getDisplayText(word);
        lineEl.appendChild(span);
      });
      stanzaEl.appendChild(lineEl);
    });
    display.appendChild(stanzaEl);
  });
}

function updateSpan(span) {
  const si = +span.dataset.stanza;
  const li = +span.dataset.line;
  const wi = +span.dataset.word;
  span.textContent = getDisplayText(stanzas[si][li][wi]);
}

function updateAllSpans() {
  document.querySelectorAll('#poem-display .word').forEach(span => updateSpan(span));
  document.getElementById('level-indicator').textContent = 'Level: ' + globalRevealLevel;
}

function startMemorizing() {
  const text = document.getElementById('poem-input').value;
  if (!text.trim()) return;
  stanzas = parsePoem(text);
  globalRevealLevel = 1;
  document.getElementById('input-view').style.display = 'none';
  document.getElementById('memorize-view').style.display = 'block';
  document.getElementById('level-indicator').textContent = 'Level: 1';
  renderPoem();
}

function resetToInput() {
  document.getElementById('memorize-view').style.display = 'none';
  document.getElementById('input-view').style.display = 'block';
}
function updateLevelIndicator() {
  const levelSpan = document.getElementById('level-indicator');
  if (levelSpan) levelSpan.textContent = `Level: ${globalRevealLevel}`;
}

function updateSpanElement(span) {
  const si = parseInt(span.dataset.stanza, 10);
  const li = parseInt(span.dataset.line, 10);
  const wi = parseInt(span.dataset.word, 10);
  if (stanzas[si] && stanzas[si][li] && stanzas[si][li][wi]) {
    span.textContent = getDisplayText(stanzas[si][li][wi]);
  }
}
function refreshAllSpans() {
  const allWordSpans = document.querySelectorAll('#poem-display .word');
  allWordSpans.forEach(span => updateSpanElement(span));
  updateLevelIndicator();
}
function resetIndividualReveals() {
  if (!stanzas.length) return;
  
  // iterate through all tokens and set individualReveal = 0
  for (let s = 0; s < stanzas.length; s++) {
    const lines = stanzas[s];
    for (let l = 0; l < lines.length; l++) {
      const tokens = lines[l];
      for (let w = 0; w < tokens.length; w++) {
        const token = tokens[w];
        if (token.core !== '') {
          token.individualReveal = 0;
        } else {
          // non-word token: keep 0 anyway
          token.individualReveal = 0;
        }
      }
    }
  }
  // after resetting all individual reveals, re-render all spans (preserve global level)
  refreshAllSpans();
}

document.getElementById('load-file-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('poem-input').value = ev.target.result;
  };
  reader.readAsText(file);
});

document.getElementById('start-btn').addEventListener('click', startMemorizing);
document.getElementById('new-poem-btn').addEventListener('click', resetToInput);
document.getElementById('reset-indiv').addEventListener('click', resetIndividualReveals);

document.getElementById('poem-display').addEventListener('click', e => {
  const span = e.target.closest('.word');
  if (!span) return;
  const si = +span.dataset.stanza;
  const li = +span.dataset.line;
  const wi = +span.dataset.word;
  const word = stanzas[si][li][wi];
  if (word.core === '') return;
  word.individualReveal = Math.min(word.individualReveal + 1, word.core.length);
  updateSpan(span);
});

document.addEventListener('keydown', e => {
  if (document.getElementById('memorize-view').style.display === 'none') return;
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    globalRevealLevel++;
    updateAllSpans();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    globalRevealLevel = Math.max(0, globalRevealLevel - 1); // Allowed level 0 for total deletion
    updateAllSpans();
  }
});
  </script>
</body>
</html>
